<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOLO — OR set-up · live board</title>
<style>
  :root{ --bg:#0a1830; --ink:#eaf1ff; --muted:#9fb3d6; --accent:#3a8bff; --good:#34c759; --warn:#ff9f0a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 800px at 80% -10%,#173058,transparent 60%),
       radial-gradient(900px 700px at 0% 110%,#0c2f3a,transparent 55%),var(--bg);
       color:var(--ink);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       -webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;
       display:grid;grid-template-columns:1fr 330px;grid-template-rows:auto 1fr auto;gap:0;}
  header{grid-column:1/-1;display:flex;align-items:center;gap:13px;padding:14px 22px}
  .mark{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(150deg,#3a8bff,#0a7ea4)}
  .mark svg{width:19px;height:19px}
  header h1{margin:0;font-size:19px;letter-spacing:-.3px}
  header .sub{font-size:12.5px;color:var(--muted)}
  header .count{margin-left:auto;text-align:right}
  header .count b{font-size:30px;font-variant-numeric:tabular-nums;letter-spacing:-1px}
  header .count span{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

  .stagewrap{position:relative;min-height:0;padding:6px 14px 6px 22px;display:flex}
  #board{position:relative;flex:1;min-height:0;background:transparent;border-radius:16px;width:100%}
  svg.plan{width:100%;height:100%;display:block}

  /* right rail */
  .rail{padding:6px 22px 6px 6px;min-height:0;display:flex;flex-direction:column;gap:14px;overflow:hidden}
  .panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:16px}
  .join{text-align:center}
  .join .qr{background:#fff;border-radius:14px;padding:12px;display:inline-block;line-height:0}
  .join .qr img{width:200px;height:200px;display:block}
  .join .hint{font-size:13px;color:var(--muted);margin:10px 0 4px}
  .join .url{font-size:12px;color:var(--ink);word-break:break-all;background:rgba(0,0,0,.25);border-radius:9px;padding:8px 10px}
  .lead h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .lead{flex:1;min-height:0;overflow:auto;display:none}
  .lrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07)}
  .lrow:last-child{border-bottom:none}
  .ldot{width:12px;height:12px;border-radius:50%;flex:none}
  .lname{flex:1;font-size:14px;font-weight:600}
  .lspread{font-variant-numeric:tabular-nums;font-weight:700;font-size:15px}
  .lspread small{font-weight:500;color:var(--muted);font-size:11px}

  footer{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:12px 22px}
  .btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:var(--ink);
    border-radius:11px;padding:11px 18px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.13s}
  .btn:hover{background:rgba(255,255,255,.12)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.on{background:var(--warn);border-color:var(--warn);color:#1a1300}
  .btn.ghost{margin-left:auto;color:var(--muted)}
  .legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .legend.byrole{margin-left:14px}
  .lg{display:flex;align-items:center;gap:6px}
  .lg i{width:11px;height:11px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
  <header>
    <span class="mark"><svg viewBox="0 0 24 24" fill="#fff"><path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7z"/></svg></span>
    <div>
      <h1>Where does everything go?</h1>
      <div class="sub">Same case, same patient — laparoscopic cholecystectomy in OR 4.</div>
    </div>
    <div class="count"><b id="count">0</b><span>submissions</span></div>
  </header>

  <div class="stagewrap"><div id="board"><svg class="plan"></svg></div></div>

  <div class="rail">
    <div class="panel join" id="joinPanel">
      <div class="qr"><img id="qr" alt="QR to join" /></div>
      <div class="hint">Scan to join — place the team, then submit.</div>
      <div class="url" id="url">—</div>
    </div>
    <div class="panel lead" id="leadPanel">
      <h3>Disagreement leaderboard</h3>
      <div id="lead"></div>
    </div>
  </div>

  <footer>
    <button class="btn primary" id="revealBtn">Reveal results</button>
    <button class="btn" id="roleBtn" disabled>Colour by role</button>
    <button class="btn" id="canonBtn" disabled>Show NOLO spec</button>
    <div class="legend" id="legend"></div>
    <button class="btn ghost" id="resetBtn">Reset</button>
  </footer>

<script src="shared.js"></script>
<script>
(function(){
  const N = window.NOLO;
  const svg = document.querySelector('#board svg.plan');
  let subs = [];           // latest submissions
  let mode = 'idle';       // idle | reveal | canon
  let byRole = false;

  const ROLE_COLOR = { cs:'#3a8bff', clinical:'#34c759', other:'#9aa0ac' };

  // join URL + QR auto-target this server's origin
  const joinURL = location.origin + '/join';
  document.getElementById('url').textContent = joinURL;
  document.getElementById('qr').src =
    'https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=10&data=' + encodeURIComponent(joinURL);

  // live data via SSE (poll fallback)
  function connect(){
    try{
      const es = new EventSource('/events');
      es.onmessage = ev => { const d = JSON.parse(ev.data); apply(d); };
      es.onerror = ()=>{ es.close(); setTimeout(poll, 1500); };
    }catch(_){ poll(); }
  }
  async function poll(){
    try{ const r = await fetch('/state'); apply(await r.json()); }catch(_){}
    setTimeout(poll, 2000);
  }
  function apply(d){
    subs = d.submissions || [];
    document.getElementById('count').textContent = d.count ?? subs.length;
    render();
  }

  // ----- rendering -----
  function pointsFor(kind){
    return subs.map(s=>{ const p = s.placements && s.placements[kind]; return p ? { fx:p.fx, fy:p.fy, role:s.role||'other' } : null; }).filter(Boolean);
  }

  function render(){
    const ctx = N.drawRoomBackdrop(svg);   // redraw clean backdrop
    if(mode === 'idle'){ document.getElementById('joinPanel').style.display=''; document.getElementById('leadPanel').style.display='none'; return; }
    document.getElementById('joinPanel').style.display = (mode==='idle')?'':'none';
    if(mode === 'reveal') renderReveal(ctx);
    if(mode === 'canon')  renderCanon(ctx);
  }

  function renderReveal(ctx){
    const { add, FX, FY } = ctx;
    const rows = [];
    N.TOKENS.forEach(kind=>{
      const k = N.KINDS[kind];
      const pts = pointsFor(kind);
      if(!pts.length) return;
      const st = N.stats(pts);
      // 1σ spread ellipse
      add('ellipse', { cx:FX(st.mx), cy:FY(st.my), rx:Math.max(st.sx*N.ROOM.w*N.U,2), ry:Math.max(st.sy*N.ROOM.h*N.U,2),
        fill:k.color, 'fill-opacity':0.10, stroke:k.color, 'stroke-opacity':0.4, 'stroke-width':0.8, 'stroke-dasharray':'3 2' });
      // every submission's marker
      pts.forEach(p=>{
        const col = byRole ? (ROLE_COLOR[p.role]||ROLE_COLOR.other) : k.color;
        add('circle', { cx:FX(p.fx), cy:FY(p.fy), r:2.4, fill:col, 'fill-opacity':0.8, stroke:'#fff', 'stroke-width':0.5, 'stroke-opacity':0.5 });
      });
      // centroid crosshair
      add('circle', { cx:FX(st.mx), cy:FY(st.my), r:3.6, fill:'none', stroke:k.color, 'stroke-width':1.6 });
      add('circle', { cx:FX(st.mx), cy:FY(st.my), r:1, fill:k.color });
      // label
      const t = add('text', { x:FX(st.mx), y:FY(st.my)-5, 'text-anchor':'middle', 'font-size':5, 'font-weight':700,
        fill:'#23324b', stroke:'#ffffff', 'stroke-width':1.4, 'stroke-opacity':0.9, 'paint-order':'stroke' });
      t.textContent = k.label;
      rows.push({ kind, label:k.label, color:k.color, spread:st.spread, n:st.n });
    });
    renderLeaderboard(rows);
  }

  function renderCanon(ctx){
    const { add, FX, FY } = ctx;
    N.TOKENS.forEach(kind=>{
      const k = N.KINDS[kind], c = N.CANON[kind]; if(!c) return;
      const cx = FX(c.fx), cy = FY(c.fy);
      if(k.cat==='equip'){
        const w=k.w*N.U,h=k.h*N.U;
        add('rect',{x:cx-w/2,y:cy-h/2,width:w,height:h,rx:3,fill:k.color,'fill-opacity':0.18,stroke:k.color,'stroke-width':1.3});
        const g=add('g',{transform:`translate(${cx-7.2} ${cy-7.2}) scale(0.6)`,fill:'none',stroke:k.color,'stroke-width':1.7,'stroke-linecap':'round','stroke-linejoin':'round'}); g.innerHTML = N.EQUIP_ICON[kind]||'';
      } else {
        add('circle',{cx,cy,r:0.31*N.U,fill:k.color,stroke:'#fff','stroke-width':1.5});
        const g=add('g',{transform:`translate(${cx-7.2} ${cy-7.2}) scale(0.6)`,fill:'none',stroke:'#fff','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}); g.innerHTML = N.ROLE_ICON[kind]||'';
      }
    });
    const t = add('text',{x:N.VBW/2,y:N.MARGIN+6,'text-anchor':'middle','font-size':6,'font-weight':700,fill:'#0a64c4'});
    t.textContent = 'One shared spec · zero ambiguity';
    document.getElementById('leadPanel').style.display='none';
  }

  function renderLeaderboard(rows){
    rows.sort((a,b)=> b.spread - a.spread);
    const host = document.getElementById('lead');
    host.innerHTML = rows.map(r=>`
      <div class="lrow">
        <span class="ldot" style="background:${r.color}"></span>
        <span class="lname">${r.label}</span>
        <span class="lspread">±${r.spread.toFixed(1)}<small> m</small></span>
      </div>`).join('');
    document.getElementById('leadPanel').style.display = rows.length ? 'flex' : 'none';
    document.getElementById('joinPanel').style.display = 'none';
  }

  function setLegend(){
    const el = document.getElementById('legend');
    if(mode==='reveal' && byRole){
      el.innerHTML = `<span class="lg"><i style="background:${ROLE_COLOR.cs}"></i>CS</span>
        <span class="lg"><i style="background:${ROLE_COLOR.clinical}"></i>Clinical</span>
        <span class="lg"><i style="background:${ROLE_COLOR.other}"></i>Other</span>`;
    } else el.innerHTML = '';
  }

  // ----- controls -----
  document.getElementById('revealBtn').addEventListener('click', ()=>{
    mode = 'reveal';
    document.getElementById('roleBtn').disabled = false;
    document.getElementById('canonBtn').disabled = false;
    document.getElementById('revealBtn').textContent = 'Re-reveal (include latecomers)';
    setLegend(); render();
  });
  document.getElementById('roleBtn').addEventListener('click', e=>{
    byRole = !byRole; e.target.classList.toggle('on', byRole);
    mode = 'reveal'; setLegend(); render();
  });
  document.getElementById('canonBtn').addEventListener('click', e=>{
    mode = (mode==='canon') ? 'reveal' : 'canon';
    e.target.classList.toggle('on', mode==='canon');
    e.target.textContent = (mode==='canon') ? 'Back to results' : 'Show NOLO spec';
    setLegend(); render();
  });
  document.getElementById('resetBtn').addEventListener('click', async ()=>{
    if(!confirm('Clear all submissions and start over?')) return;
    await fetch('/reset?key=nolo', { method:'POST' });
    mode='idle'; byRole=false;
    document.getElementById('roleBtn').disabled=true; document.getElementById('roleBtn').classList.remove('on');
    document.getElementById('canonBtn').disabled=true; document.getElementById('canonBtn').classList.remove('on'); document.getElementById('canonBtn').textContent='Show NOLO spec';
    document.getElementById('revealBtn').textContent='Reveal results';
    setLegend(); render();
  });

  N.drawRoomBackdrop(svg);
  connect();
})();
</script>
</body>
</html>
