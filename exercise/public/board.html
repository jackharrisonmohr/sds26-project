<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOLO — OR set-up · live board</title>
<style>
  :root{ --ink:#eaf1ff; --muted:#9fb3d6; --accent:#3a8bff; --warn:#ff9f0a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 800px at 80% -10%,#173058,transparent 60%),
       radial-gradient(900px 700px at 0% 110%,#0c2f3a,transparent 55%),#0a1830;
       color:var(--ink);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       -webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:13px;padding:13px 22px;flex:none}
  .mark{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(150deg,#3a8bff,#0a7ea4)}
  .mark svg{width:18px;height:18px}
  header h1{margin:0;font-size:18px;letter-spacing:-.3px}
  header .sub{font-size:12px;color:var(--muted)}
  header .hcount{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--muted);font-size:13px}
  header .hcount b{color:var(--ink);font-size:18px}

  /* ---------- LOBBY ---------- */
  #lobby{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:20px}
  #lobby .qr{background:#fff;border-radius:20px;padding:18px;line-height:0;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  #lobby .qr img{width:min(46vh,360px);height:min(46vh,360px);display:block}
  #lobby .scan{font-size:20px;font-weight:600}
  #lobby .url{font-size:14px;color:var(--muted);background:rgba(0,0,0,.25);border-radius:10px;padding:8px 14px}
  #lobby .big{font-size:64px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums;line-height:1}
  #lobby .big small{display:block;font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  #lobby .row{display:flex;gap:12px}

  /* ---------- REVEAL ---------- */
  #stageView{flex:1;min-height:0;display:none;grid-template-columns:1fr 320px;grid-template-rows:1fr auto}
  .stagewrap{grid-row:1;grid-column:1;min-height:0;padding:6px 12px 6px 22px;display:flex}
  #board{flex:1;min-height:0;width:100%}
  svg.plan{width:100%;height:100%;display:block}
  .rail{grid-row:1;grid-column:2;min-height:0;padding:6px 20px 6px 8px;display:flex;flex-direction:column}
  .panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;min-height:0}
  .panel h3{margin:0 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .panel .allnone{display:flex;gap:10px;margin:2px 0 10px}
  .panel .allnone button{background:none;border:none;color:var(--accent);font:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:0}
  .legend{overflow:auto}
  .lrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer;user-select:none}
  .lrow:last-child{border-bottom:none}
  .lrow.off{opacity:.4}
  .lbox{width:18px;height:18px;border-radius:5px;border:2px solid currentColor;flex:none;display:grid;place-items:center}
  .lbox svg{width:12px;height:12px;opacity:0}
  .lrow:not(.off) .lbox svg{opacity:1}
  .lsw{width:11px;height:11px;border-radius:50%;flex:none}
  .lname{flex:1;font-size:14px;font-weight:600;white-space:nowrap}
  .lspread{font-variant-numeric:tabular-nums;font-weight:700;font-size:15px;text-align:right}
  .lspread small{font-weight:500;color:var(--muted);font-size:11px}

  footer{grid-row:2;grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:12px 22px}
  .btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:var(--ink);
    border-radius:11px;padding:11px 18px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.13s}
  .btn:hover{background:rgba(255,255,255,.12)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.on{background:var(--warn);border-color:var(--warn);color:#1a1300}
  .btn.ghost{color:var(--muted)}
  .legendc{display:flex;gap:14px;align-items:center;font-size:12px;color:var(--muted)}
  .legendc .lg{display:flex;align-items:center;gap:6px}
  .legendc .lg i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .spacer{margin-left:auto}
</style>
</head>
<body>
  <header>
    <span class="mark"><svg viewBox="0 0 24 24" fill="#fff"><path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7z"/></svg></span>
    <div>
      <h1>NOLO · OR set-up</h1>
      <div class="sub">Same case, same patient — laparoscopic cholecystectomy in OR 4.</div>
    </div>
    <div class="hcount"><b id="hcount">0</b> submissions</div>
  </header>

  <!-- LOBBY -->
  <div id="lobby">
    <div class="scan">Scan to join</div>
    <div class="qr"><img id="qr" alt="QR to join" /></div>
    <div class="url" id="url">—</div>
    <div class="big"><span id="bigcount">0</span><small>submissions</small></div>
    <div class="row">
      <button class="btn primary" id="revealBtn">Reveal results</button>
      <button class="btn ghost" id="resetBtn1">Reset</button>
    </div>
  </div>

  <!-- REVEAL -->
  <div id="stageView">
    <div class="stagewrap"><div id="board"><svg class="plan"></svg></div></div>
    <div class="rail">
      <div class="panel" style="flex:1">
        <h3>Show / hide elements</h3>
        <div class="allnone"><button id="allBtn">All</button><button id="noneBtn">None</button></div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
    <footer>
      <button class="btn" id="backBtn">← Back to QR</button>
      <button class="btn" id="roleBtn">Icon by role</button>
      <button class="btn" id="canonBtn">Show NOLO spec</button>
      <div class="legendc" id="legendc"></div>
      <button class="btn ghost spacer" id="resetBtn2">Reset</button>
    </footer>
  </div>

<script src="shared.js"></script>
<script>
(function(){
  const N = window.NOLO;
  const svg = document.querySelector('#board svg.plan');
  let subs = [], mode = 'lobby', byRole = false;
  const visible = new Set(N.ELEMENTS);

  const joinURL = location.origin + '/join';
  document.getElementById('url').textContent = joinURL;
  document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=420x420&margin=12&data=' + encodeURIComponent(joinURL);

  // ---------- live data ----------
  function connect(){
    try{ const es = new EventSource('/events'); es.onmessage = ev => apply(JSON.parse(ev.data)); es.onerror = ()=>{ es.close(); setTimeout(poll,1500); }; }
    catch(_){ poll(); }
  }
  async function poll(){ try{ apply(await (await fetch('/state')).json()); }catch(_){} setTimeout(poll,2000); }
  function apply(d){
    subs = d.submissions || [];
    const c = d.count ?? subs.length;
    document.getElementById('hcount').textContent = c;
    document.getElementById('bigcount').textContent = c;
    if(mode !== 'lobby') render();
  }

  // ---------- helpers ----------
  function pointsFor(kind){
    if(kind === 'table') return subs.map(s=> s.table ? { fx:s.table.fx, fy:s.table.fy, angle:s.table.angle||0, role:s.role||'clinical' } : null).filter(Boolean);
    return subs.map(s=>{ const p = s.placements && s.placements[kind]; return p ? { fx:p.fx, fy:p.fy, role:s.role||'clinical' } : null; }).filter(Boolean);
  }
  function drawRoleGlyph(add, cx, cy, role, color, S){
    const k = S/24, inner = N.ROLE_GLYPH[role] || N.ROLE_GLYPH.clinical;
    const g = add('g', { transform:`translate(${cx-12*k} ${cy-12*k}) scale(${k})`, fill:color, 'fill-opacity':0.92 });
    g.innerHTML = inner;
  }

  // ---------- render ----------
  function render(){
    const ctx = N.drawRoomBackdrop(svg);
    if(mode === 'canon'){ renderCanon(ctx); return; }
    const rows = [];
    N.ELEMENTS.forEach(kind=>{
      const k = N.KINDS[kind], pts = pointsFor(kind);
      if(!pts.length) return;
      const st = N.stats(pts);
      const row = { kind, label:k.label, color:k.color, spread:st.spread, n:st.n };
      if(kind === 'table'){ const a = N.angleStats(pts.map(p=>p.angle)); row.angle = a ? a.stdDeg : 0; }
      rows.push(row);
      if(visible.has(kind)) drawElement(ctx, kind, pts);
    });
    buildLegend(rows);
  }

  // just the actual data points — no average region, no centroid
  function drawElement(ctx, kind, pts){
    const { add, FX, FY } = ctx, col = N.KINDS[kind].color;
    if(kind === 'table'){
      const L = 1.0*N.U;
      pts.forEach(p=>{ const a=(p.angle||0)*Math.PI/180, hx=Math.sin(a), hy=-Math.cos(a),
        cx=FX(p.fx), cy=FY(p.fy), hxp=cx+L*hx, hyp=cy+L*hy;
        add('line', { x1:cx-L*hx, y1:cy-L*hy, x2:hxp, y2:hyp, stroke:col, 'stroke-opacity':0.5, 'stroke-width':1, 'stroke-linecap':'round' });
        if(byRole) drawRoleGlyph(add, hxp, hyp, p.role, col, 8);
        else add('circle', { cx:hxp, cy:hyp, r:1.7, fill:col, 'fill-opacity':0.85 }); });
    } else {
      pts.forEach(p=>{ const cx=FX(p.fx), cy=FY(p.fy);
        if(byRole) drawRoleGlyph(add, cx, cy, p.role, col, 7.5);
        else add('circle', { cx, cy, r:1.9, fill:col, 'fill-opacity':0.78 }); });
    }
  }

  function renderCanon(ctx){
    const { add, FX, FY } = ctx;
    N.ELEMENTS.forEach(kind=>{
      const k = N.KINDS[kind], c = N.CANON[kind]; if(!c) return;
      const cx = FX(c.fx), cy = FY(c.fy);
      if(kind === 'table'){
        const w=k.w*N.U, h=k.h*N.U;
        add('rect',{x:cx-w/2,y:cy-h/2,width:w,height:h,rx:5,fill:'#e3eeff',stroke:'#0a84ff','stroke-width':1.3});
        add('circle',{cx,cy:cy-h/2+0.34*N.U,r:0.27*N.U,fill:'#0a84ff','fill-opacity':0.85});
      } else if(k.cat==='equip'){
        const w=k.w*N.U,h=k.h*N.U;
        add('rect',{x:cx-w/2,y:cy-h/2,width:w,height:h,rx:3,fill:k.color,'fill-opacity':0.2,stroke:k.color,'stroke-width':1.3});
        const gl=N.EQUIP_ICON[kind]; if(gl){ const g=add('g',{transform:`translate(${cx-7.2} ${cy-7.2}) scale(0.6)`,fill:'none',stroke:k.color,'stroke-width':1.7,'stroke-linecap':'round','stroke-linejoin':'round'}); g.innerHTML=gl; }
      } else {
        add('circle',{cx,cy,r:0.31*N.U,fill:k.color,stroke:'#fff','stroke-width':1.5});
        const g=add('g',{transform:`translate(${cx-7.2} ${cy-7.2}) scale(0.6)`,fill:'none',stroke:'#fff','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}); g.innerHTML=N.ROLE_ICON[kind]||'';
      }
    });
    const t = add('text',{x:N.VBW/2,y:N.MARGIN+6,'text-anchor':'middle','font-size':6,'font-weight':700,fill:'#0a64c4'});
    t.textContent = 'One shared spec · zero ambiguity';
  }

  // ---------- legend (show/hide) ----------
  const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  function buildLegend(rows){
    rows.sort((a,b)=> b.spread - a.spread);
    const host = document.getElementById('legend');
    host.innerHTML = rows.map(r=>{
      const extra = r.kind==='table' ? ` · ±${Math.round(r.angle)}°` : '';
      return `<div class="lrow ${visible.has(r.kind)?'':'off'}" data-k="${r.kind}" style="color:${r.color}">
        <span class="lbox">${CHECK}</span>
        <span class="lsw" style="background:${r.color}"></span>
        <span class="lname" style="color:var(--ink)">${r.label}</span>
        <span class="lspread" style="color:var(--ink)">±${r.spread.toFixed(1)}<small> m${extra}</small></span>
      </div>`;
    }).join('');
    host.querySelectorAll('.lrow').forEach(el=> el.addEventListener('click', ()=>{
      const k = el.dataset.k; if(visible.has(k)) visible.delete(k); else visible.add(k); render();
    }));
  }
  const miniGlyph = role => `<svg viewBox="0 0 24 24" width="15" height="15" fill="#cdd9ee">${N.ROLE_GLYPH[role]}</svg>`;
  function setLegendC(){
    const el = document.getElementById('legendc');
    el.innerHTML = (mode==='reveal' && byRole)
      ? `<span class="lg">${miniGlyph('clinical')} Clinical</span><span class="lg">${miniGlyph('cs')} Computer science</span>`
      : '';
  }

  // ---------- mode switching ----------
  function showLobby(){ mode='lobby'; document.getElementById('lobby').style.display='flex'; document.getElementById('stageView').style.display='none'; }
  function showReveal(){ mode='reveal'; document.getElementById('lobby').style.display='none'; document.getElementById('stageView').style.display='grid'; setLegendC(); render(); }

  document.getElementById('revealBtn').addEventListener('click', showReveal);
  document.getElementById('backBtn').addEventListener('click', showLobby);
  document.getElementById('allBtn').addEventListener('click', ()=>{ N.ELEMENTS.forEach(k=>visible.add(k)); render(); });
  document.getElementById('noneBtn').addEventListener('click', ()=>{ visible.clear(); render(); });
  document.getElementById('roleBtn').addEventListener('click', e=>{ byRole=!byRole; e.target.classList.toggle('on',byRole); mode='reveal'; document.getElementById('canonBtn').classList.remove('on'); document.getElementById('canonBtn').textContent='Show NOLO spec'; setLegendC(); render(); });
  document.getElementById('canonBtn').addEventListener('click', e=>{ mode = (mode==='canon')?'reveal':'canon'; e.target.classList.toggle('on',mode==='canon'); e.target.textContent = (mode==='canon')?'Back to results':'Show NOLO spec'; setLegendC(); render(); });

  async function doReset(){ if(!confirm('Clear all submissions and start over?')) return; await fetch('/reset?key=nolo',{method:'POST'}); byRole=false; N.ELEMENTS.forEach(k=>visible.add(k)); document.getElementById('roleBtn').classList.remove('on'); document.getElementById('canonBtn').classList.remove('on'); document.getElementById('canonBtn').textContent='Show NOLO spec'; showLobby(); }
  document.getElementById('resetBtn1').addEventListener('click', doReset);
  document.getElementById('resetBtn2').addEventListener('click', doReset);

  connect();
})();
</script>
</body>
</html>
