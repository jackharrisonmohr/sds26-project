<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NOLO — set up the OR</title>
<style>
  :root{ --bg:#eef0f4; --card:#fff; --ink:#1c1c1e; --muted:#6b7280; --faint:#9aa0ac;
         --line:#e4e6eb; --accent:#007aff; --good:#34c759; }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
    padding:14px 14px 28px; max-width:560px; margin:0 auto; overscroll-behavior:none;}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .mark{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(150deg,#3a8bff,#0a7ea4)}
  .mark svg{width:17px;height:17px}
  .brand b{font-size:17px;letter-spacing:-.3px}
  .task{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    box-shadow:0 1px 3px rgba(20,30,55,.07);margin-bottom:12px}
  .task h1{margin:0 0 11px;font-size:18px;letter-spacing:-.2px}
  .task h1 span{color:var(--faint);font-weight:600;font-size:15px}
  .steps{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
  .steps li{display:flex;gap:11px;align-items:flex-start;font-size:14.5px;line-height:1.4}
  .steps li b{font-weight:700}
  .steps .n{flex:none;width:23px;height:23px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:13px;font-weight:700;display:grid;place-items:center;margin-top:1px}
  .hint{margin-top:12px;padding-top:11px;border-top:1px solid var(--line);
    font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .hint .bdot{width:12px;height:12px;border-radius:50%;background:#0a84ff;flex:none;box-shadow:0 0 0 3px rgba(10,132,255,.18)}
  .who{margin:10px 0 9px}
  .who input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    font:inherit;font-size:14px;background:var(--card)}
  .rolepick{display:flex;align-items:center;gap:10px;margin:0 0 12px}
  .rolepick .rl{font-size:13px;color:var(--muted);font-weight:600;flex:none}
  .seg{display:inline-flex;flex:1;background:#e6e8ed;border-radius:10px;padding:2px;gap:2px}
  .seg button{flex:1;border:none;background:transparent;border-radius:8px;padding:9px 10px;font:inherit;
    font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.12)}

  #stage{position:relative;width:100%;aspect-ratio:183.6 / 169.2;
    touch-action:none;user-select:none;-webkit-user-select:none}
  #stage svg.plan{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* draggable people / equipment */
  .token{position:absolute;transform:translate(-50%,-50%);touch-action:none;cursor:grab;
    display:grid;place-items:center;z-index:3}
  .token.dragging{cursor:grabbing;z-index:9;filter:drop-shadow(0 6px 12px rgba(20,30,55,.3))}
  .token .vis{display:grid;place-items:center;pointer-events:none}
  .token.person .vis{border-radius:50%;width:42px;height:42px;color:#fff;box-shadow:0 2px 6px rgba(20,30,55,.28)}
  .token.equip .vis{border-radius:7px;height:40px;box-shadow:0 2px 6px rgba(20,30,55,.22)}
  .token .vis svg{width:60%;height:60%}
  .token .tag{position:absolute;top:calc(100% + 1px);left:50%;transform:translateX(-50%);
    white-space:nowrap;font-size:10.5px;font-weight:600;color:#3a4250;pointer-events:none;
    text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff}
  .token.untouched .vis{outline:2px dashed rgba(0,0,0,.28);outline-offset:3px;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{50%{outline-color:rgba(0,0,0,.08)}}

  /* the OR table — movable + rotatable */
  .table-token{position:absolute;transform-origin:center center;z-index:4;touch-action:none}
  .table-token .field{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:300%;height:150%;border:1.2px dashed rgba(0,163,196,.5);background:rgba(0,163,196,.05);
    border-radius:50%;pointer-events:none}
  .table-token .body{position:relative;width:100%;height:100%;background:#e3eeff;border:1.6px solid #0a84ff;
    border-radius:7px;box-shadow:0 2px 7px rgba(20,30,55,.25);cursor:grab;touch-action:none}
  .table-token .head{position:absolute;top:5px;left:50%;transform:translateX(-50%);
    width:70%;aspect-ratio:1;border-radius:50%;background:#0a84ff;opacity:.9}
  .table-token .stem{position:absolute;left:50%;top:-18px;width:1.5px;height:18px;background:#0a84ff;opacity:.5;transform:translateX(-50%)}
  .table-token .rot{position:absolute;left:50%;top:-30px;transform:translateX(-50%);
    width:26px;height:26px;border-radius:50%;background:#fff;border:1.5px solid #0a84ff;
    display:grid;place-items:center;cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,.25);touch-action:none}
  .table-token .rot svg{width:15px;height:15px}
  .table-token .tlabel{position:absolute;left:50%;bottom:-16px;transform:translateX(-50%);
    font-size:9.5px;font-weight:700;color:#0a64c4;white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff}

  .barwrap{margin-top:14px}
  .progress{font-size:13px;color:var(--muted);margin-bottom:8px;text-align:center}
  .progress b{color:var(--ink)}
  .submit{width:100%;border:none;border-radius:13px;padding:15px;font:inherit;font-size:16px;
    font-weight:700;color:#fff;background:var(--accent);cursor:pointer;transition:.15s}
  .submit:disabled{background:#c3c7cf;cursor:not-allowed}
  .submit:active:not(:disabled){transform:scale(.99)}

  .done{position:fixed;inset:0;background:linear-gradient(160deg,#0b1b3a,#0a2540 60%,#072033);
    color:#fff;display:none;place-items:center;text-align:center;z-index:50;padding:24px}
  .done.show{display:grid}
  .done .ok{width:74px;height:74px;border-radius:50%;background:#34c759;display:grid;place-items:center;
    margin:0 auto 18px;box-shadow:0 12px 40px rgba(52,199,89,.45)}
  .done .ok svg{width:38px;height:38px}
  .done h2{margin:0 0 6px;font-size:24px}
  .done p{margin:0;color:#aecbff;font-size:15px}
  .done button{margin-top:24px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;
    border-radius:11px;padding:11px 20px;font:inherit;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
  <div class="brand">
    <span class="mark"><svg viewBox="0 0 24 24" fill="#fff"><path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7z"/></svg></span>
    <b>NOLO · OR set-up</b>
  </div>

  <div class="task">
    <h1>Set up OR 4 <span>· lap chole</span></h1>
    <ol class="steps">
      <li><span class="n">1</span><span>Move &amp; rotate the <b>OR table</b> — drag it, or the ⟳ knob</span></li>
      <li><span class="n">2</span><span>Drag the <b>team &amp; equipment</b> where you'd put them</span></li>
    </ol>
    <div class="hint"><span class="bdot"></span>Blue end = patient's head · no other hints</div>
  </div>

  <div class="who">
    <input id="name" placeholder="Your name (optional)" maxlength="24" autocomplete="off" />
  </div>
  <div class="rolepick">
    <span class="rl">You are</span>
    <div class="seg" id="role">
      <button data-role="clinical">Clinical</button>
      <button data-role="cs">Computer science</button>
    </div>
  </div>

  <div id="stage"><svg class="plan"></svg></div>

  <div class="barwrap">
    <div class="progress" id="progress"><b>0</b> / 6 placed</div>
    <button class="submit" id="submit" disabled>Place all 6 to submit</button>
  </div>

  <div class="done" id="done">
    <div>
      <div class="ok"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
      <h2>Submitted ✓</h2>
      <p>Now watch the big screen.</p>
      <button id="edit">Edit my placement</button>
    </div>
  </div>

<script src="shared.js"></script>
<script>
(function(){
  const N = window.NOLO;
  const stage = document.getElementById('stage');
  const svg = stage.querySelector('svg.plan');
  N.drawRoomBackdrop(svg);

  // ----- identity -----
  let clientId = localStorage.getItem('nolo_cid');
  if(!clientId){ clientId = 'c'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('nolo_cid', clientId); }
  let role = null;
  document.getElementById('role').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); role = b.dataset.role; updateProgress();
  });

  const hexA = (hex,a)=>{ const h=hex.replace('#',''); return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`; };
  const stageRect = ()=> stage.getBoundingClientRect();

  // ===================== OR TABLE (move + rotate) =====================
  const tbl = { fx:0.5, fy:0.5, angle:0 };
  const K = N.KINDS.table;
  const tEl = document.createElement('div');
  tEl.className = 'table-token';
  tEl.style.width  = (K.w*N.U / N.VBW * 100) + '%';
  tEl.style.height = (K.h*N.U / N.VBH * 100) + '%';
  tEl.innerHTML = `
    <div class="field"></div>
    <div class="body"><div class="head"></div></div>
    <div class="stem"></div>
    <div class="rot"><svg viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-1.6 5"/><path d="M20 4v6h-6"/></svg></div>
    <div class="tlabel">OR table</div>`;
  stage.appendChild(tEl);
  function placeTable(){
    tEl.style.left = N.pctX(tbl.fx)+'%';
    tEl.style.top  = N.pctY(tbl.fy)+'%';
    tEl.style.transform = `translate(-50%,-50%) rotate(${tbl.angle}deg)`;
  }
  placeTable();

  // drag the body to move
  (function(){
    const body = tEl.querySelector('.body'); let pid=null;
    body.addEventListener('pointerdown', e=>{ e.preventDefault(); pid=e.pointerId; try{body.setPointerCapture(pid);}catch(_){} body.style.cursor='grabbing'; });
    body.addEventListener('pointermove', e=>{ if(pid===null) return; const r=stageRect(); tbl.fx=N.fxFromClient(e.clientX,r); tbl.fy=N.fyFromClient(e.clientY,r); placeTable(); });
    const end=()=>{ if(pid===null) return; try{body.releasePointerCapture(pid);}catch(_){} pid=null; body.style.cursor='grab'; };
    body.addEventListener('pointerup', end); body.addEventListener('pointercancel', end);
  })();
  // drag the knob to rotate
  (function(){
    const rot = tEl.querySelector('.rot'); let pid=null;
    rot.addEventListener('pointerdown', e=>{ e.preventDefault(); e.stopPropagation(); pid=e.pointerId; try{rot.setPointerCapture(pid);}catch(_){} });
    rot.addEventListener('pointermove', e=>{
      if(pid===null) return; e.stopPropagation();
      const b = tEl.getBoundingClientRect();           // bbox centre == table centre
      const cx = b.left+b.width/2, cy = b.top+b.height/2;
      tbl.angle = Math.atan2(e.clientY-cy, e.clientX-cx)*180/Math.PI + 90;
      placeTable();
    });
    const end=()=>{ if(pid===null) return; try{rot.releasePointerCapture(pid);}catch(_){} pid=null; };
    rot.addEventListener('pointerup', end); rot.addEventListener('pointercancel', end);
  })();

  // ===================== TRAY TOKENS =====================
  const state = {}; const els = {};
  const n = N.TOKENS.length;
  N.TOKENS.forEach((kind, i)=>{
    const k = N.KINDS[kind];
    const fx = 0.10 + (0.80 * i/(n-1));
    const fy = (i % 2 === 0) ? 0.83 : 0.94;
    state[kind] = { fx, fy, touched:false };

    const el = document.createElement('div');
    el.className = 'token untouched ' + (k.cat==='person' ? 'person':'equip');
    const vis = document.createElement('div'); vis.className = 'vis';
    if(k.cat==='person'){
      vis.style.background = k.color;
      vis.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${N.ROLE_ICON[kind]||''}</svg>`;
    } else {
      vis.style.width = Math.min(40*(k.w/k.h), 72)+'px';
      vis.style.background = hexA(k.color,0.20);
      vis.style.border = '1.5px solid '+k.color;
      vis.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="${k.color}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${N.EQUIP_ICON[kind]||''}</svg>`;
    }
    const tag = document.createElement('div'); tag.className='tag'; tag.textContent = k.short || k.label;
    el.appendChild(vis); el.appendChild(tag);
    stage.appendChild(el); els[kind] = el; place(kind); attachDrag(el, kind);
  });

  function place(kind){ els[kind].style.left = N.pctX(state[kind].fx)+'%'; els[kind].style.top = N.pctY(state[kind].fy)+'%'; }
  function attachDrag(el, kind){
    let startX=0,startY=0,moved=false,pid=null;
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); pid=e.pointerId; try{el.setPointerCapture(pid);}catch(_){} el.classList.add('dragging'); startX=e.clientX; startY=e.clientY; moved=false; });
    el.addEventListener('pointermove', e=>{
      if(pid===null) return; const r=stageRect(); const s=state[kind];
      s.fx=N.fxFromClient(e.clientX,r); s.fy=N.fyFromClient(e.clientY,r); place(kind);
      if(!moved && Math.hypot(e.clientX-startX,e.clientY-startY)>4){ moved=true; if(!s.touched){ s.touched=true; el.classList.remove('untouched'); updateProgress(); } }
    });
    const end=()=>{ if(pid===null) return; try{el.releasePointerCapture(pid);}catch(_){} pid=null; el.classList.remove('dragging'); };
    el.addEventListener('pointerup', end); el.addEventListener('pointercancel', end);
  }

  const placedCount = ()=> N.TOKENS.filter(k=>state[k].touched).length;
  function updateProgress(){
    const c = placedCount();
    document.getElementById('progress').innerHTML = `<b>${c}</b> / ${n} placed`;
    const btn = document.getElementById('submit');
    btn.disabled = !(c >= n && role);
    btn.textContent = !role ? 'Pick Clinical or CS above'
      : c < n ? `Place all ${n} to submit`
      : 'Submit my set-up';
  }
  updateProgress();

  // ===================== SUBMIT =====================
  document.getElementById('submit').addEventListener('click', async ()=>{
    const placements = {};
    N.TOKENS.forEach(k=>{ placements[k] = { fx:+state[k].fx.toFixed(4), fy:+state[k].fy.toFixed(4) }; });
    const body = {
      clientId, name: document.getElementById('name').value.trim().slice(0,24), role,
      table: { fx:+tbl.fx.toFixed(4), fy:+tbl.fy.toFixed(4), angle:+tbl.angle.toFixed(1) },
      placements,
    };
    const btn = document.getElementById('submit'); btn.disabled = true; btn.textContent = 'Sending…';
    try{
      await fetch('/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      document.getElementById('done').classList.add('show');
    }catch(err){ btn.disabled=false; btn.textContent='Tap to retry'; alert('Could not send — check signal and retry.'); }
  });
  document.getElementById('edit').addEventListener('click', ()=> document.getElementById('done').classList.remove('show'));
})();
</script>
</body>
</html>
